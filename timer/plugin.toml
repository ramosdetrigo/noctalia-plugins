# Reference [[desktop_widget]] plugin: a countdown timer built from the
# declarative ui.* vocabulary (desktopWidget.render). Demonstrates the full
# desktop-widget pipeline: manifest -> appears in the desktop-widget editor ->
# declarative control tree -> button callbacks -> second ticks -> settings.

id = "jubii/timer"
name = "Timer"
version = "1.0.1"
min_noctalia = "5.0.0"
author = "jubii"
license = "MIT"
dependencies = []
tags = ["countdown", "desktop"]
icon = "clock"
description = "A countdown timer desktop widget with start/pause and reset."

[[desktop_widget]]
id = "timer"
entry = "timer.luau"

  [[desktop_widget.setting]]
  key = "duration"
  type = "int"
  label_key = "settings.duration.label"
  description_key = "settings.duration.description"
  default = 300
  min = 10
  max = 7200
  step = 10

  [[desktop_widget.setting]]
  key = "color"
  type = "color"
  label_key = "settings.color.label"
  description_key = "settings.color.description"
  default = "primary"

  [[desktop_widget.setting]]
  key = "show_progress"
  type = "bool"
  label_key = "settings.show_progress.label"
  default = true
